name: MLOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Save lint logs to a file
        mkdir -p logs
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics > logs/flake8-critical.log
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics > logs/flake8-full.log

    - name: Format check with black
      run: |
        black --check src/ tests/ > logs/black-format.log 2>&1 || true

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term | tee logs/pytest.log

    - name: Run model training pipeline
      run: |
        # Run training script and record output/metrics logs
        python src/model_trainer.py 2>&1 | tee logs/training.log

    - name: Upload code coverage report
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: Upload Logs as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: workflow-logs
        path: logs/
        retention-days: 7

    - name: Upload Trained Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        # Adjust path to where your script outputs models or evaluation reports
        path: |
          *.pkl
          *.joblib
          models/
          metrics/
        if-no-files-found: ignore
        retention-days: 14

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t heart-disease-api:latest .
        docker run --rm heart-disease-api:latest /bin/bash -c "pip list | grep -E 'fastapi|scikit'"